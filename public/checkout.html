<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSphere | Checkout</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="checkout">
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">ShopSphere</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="dashboard.html">Dashboard</a>
        <div class="nav-auth" id="navAuth"></div>
      </nav>
      <button class="menu-button" type="button"></button>
    </div>
  </header>

  <main class="container page-shell">
    <div class="page-head">
      <div>
        <h1 class="page-title">Checkout</h1>
        <p class="page-copy">Confirm your customer details and place the order in a clean, distraction-free layout.</p>
      </div>
    </div>

    <div class="checkout-shell panel detail-layout fade-in">
      <section class="panel">
        <h2 style="margin-top:0;">Customer information</h2>
        <p class="helper-text">This information is used for shipping and order confirmation.</p>
        <form id="checkoutForm" class="form-stack" style="margin-top: 1rem;">
          <div class="form-grid">
            <input class="form-control" name="customerName" placeholder="Full name" required>
            <input class="form-control" name="email" type="email" placeholder="Email address" required>
            <input class="form-control" name="phone" placeholder="Phone number" required>
            <input class="form-control" name="city" placeholder="City / Region">
          </div>
          <textarea class="form-control" name="shippingAddress" placeholder="Shipping address" rows="5" required></textarea>
          <div style="display:flex; gap:0.75rem; flex-wrap:wrap; margin-top: 0.5rem;">
            <button type="submit" class="button button-primary">Place order</button>
            <a href="cart.html" class="button button-secondary">Cancel</a>
          </div>
        </form>
      </section>
      <aside class="panel" id="checkoutSummary"></aside>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('checkoutForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(this).entries());
      try {
        const response = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(localStorage.getItem('token') ? { Authorization: `Bearer ${localStorage.getItem('token')}` } : {}),
          },
          credentials: 'include',
          body: JSON.stringify(data),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || 'Checkout failed');
        const toast = document.getElementById('toast');
        toast.textContent = result.message;
        toast.classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (error) {
        const toast = document.getElementById('toast');
        toast.textContent = error.message;
        toast.classList.add('show');
      }
    });
  </script>
</body>
</html>
