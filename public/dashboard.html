<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSphere | Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="dashboard">
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">ShopSphere</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <a href="cart.html">Cart</a>
        <div class="nav-auth" id="navAuth"></div>
      </nav>
      <button class="menu-button" type="button"></button>
    </div>
  </header>

  <main class="container page-shell">
    <div class="page-head">
      <div>
        <h1 class="page-title">Account dashboard</h1>
        <p class="page-copy">Track your profile, view purchase history, and manage your account from one streamlined place.</p>
      </div>
    </div>

    <section class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 1rem;">
      <div class="spec-card fade-in"><span class="spec-label">Orders</span><span class="spec-value">Recent activity</span></div>
      <div class="spec-card fade-in"><span class="spec-label">Profile</span><span class="spec-value">Account details</span></div>
      <div class="spec-card fade-in"><span class="spec-label">Security</span><span class="spec-value">JWT session active</span></div>
    </section>

    <section class="detail-layout">
      <div class="panel fade-in">
        <h2 style="margin-top:0;">Profile</h2>
        <div id="profileBox" class="loading-surface">Loading profile...</div>
      </div>
      <div class="panel fade-in">
        <h2 style="margin-top:0;">Previous orders</h2>
        <div id="ordersTable" class="loading-surface">Loading orders...</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
